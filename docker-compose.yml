services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  db:
    image: postgres:18
    container_name: devhub-postgres
    environment:
      POSTGRES_DB: devhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - devhub_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database Migrator (Drizzle Push)
  db-migrator:
    image: ghcr.io/th11n/devhub-migrator:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # Web app (Next.js)
  web:
    image: ghcr.io/th11n/devhub-web@sha256:ab941c95691bda2e2a3f4c8aa1873ee0e54f4c56691317f4137e948babdd444f
    # build:
    #   context: .
    #   dockerfile: apps/web/Dockerfile
    #   args:
    #     NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    #     DATABASE_URL: ${DATABASE_URL}
    #     BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    #     BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    #     CORS_ORIGIN: ${CORS_ORIGIN}
    #     REDIS_URL: ${REDIS_URL}
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - server
    restart: unless-stopped

  # API Server (Bun + Puppeteer)
  server:
    image: ghcr.io/th11n/devhub-server@sha256:fb36cdb452c8964a3299acdd9399dd6d5ec55622d69dd6b724ef89339d5ae00a
    # build:
    #   context: .
    #   dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  # Queue Worker (Bun + Puppeteer)
  queue-worker:
    image: ghcr.io/th11n/devhub-queue-worker:latest
    # build:
    #   context: .
    #   dockerfile: apps/queue-worker/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  # Discord Bot (Bun)
  bot:
    image: ghcr.io/th11n/devhub-bot:latest
    # build:
    #   context: .
    #   dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - rabbitmq
      - db
    ports:
      - "8787:3000"
    restart: unless-stopped

  # CMS (Sanity Studio)
  cms:
    image: ghcr.io/th11n/devhub-cms:latest
    # build:
    #   context: .
    #   dockerfile: apps/cms/Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  devhub_postgres_data: